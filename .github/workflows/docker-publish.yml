name: Build and publish Docker image

# Trigger on every push to main (i.e. every merged PR).
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Required for GITHUB_TOKEN to push to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      # Check out the code at the commit that triggered the workflow.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the built-in GITHUB_TOKEN.
      # No personal access token needed — GitHub provides this automatically.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate two tags for each build:
      #   :latest       — always points to the most recent build
      #   :<commit-sha> — e.g. sha-a1b2c3d, lets you trace which code is in any image
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/davida227/wardrobe-app
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Build and push the image. NEXT_PUBLIC_* vars are pulled from GitHub
      # repository secrets so they are never hardcoded in this file.
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
